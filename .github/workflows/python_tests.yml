name: Python application test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache Python environment
        id: cache-python-env
        uses: actions/cache@v3
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt', '**/.python-version') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install Python environment
        if: steps.cache-python-env.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Install Chrome for Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver || sudo apt-get install -y chromium chromium-driver
          if [ -f /usr/bin/chromium-browser ]; then
            sudo ln -sf /usr/bin/chromium-browser /usr/bin/google-chrome
          elif [ -f /usr/bin/chromium ]; then
            sudo ln -sf /usr/bin/chromium /usr/bin/google-chrome
          fi
          which google-chrome || true
          which chromedriver || true

      - name: Write .env
        run: |
          cat > .env <<EOF
          DATA_DIR=_data
          OUTPUT_DIR=_output
          REPORT_DATE=12312025
          REPORT_DATE_SLASH=12/31/2025
          MARKET_START_DATE=2024-12-31
          MARKET_END_DATE=2025-12-31
          EOF

      - name: Build project outputs
        run: |
          source .venv/bin/activate
          doit process_ffiec pull_gsib pull_treasury_yields pull_mbs_etfs compute_market_shocks make_table_1

      - name: Test with pytest
        run: |
          source .venv/bin/activate
          pytest
